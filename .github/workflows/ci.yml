name: Espresso Android Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  instrumented-tests:
    name: Run Espresso Tests on Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK and test APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_4
          avd-name: test_avd_29
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            ./gradlew connectedAndroidTest || true

      - name: Pull screenshots from device
        if: always()
        run: |
          mkdir -p test-artifacts/screenshots
          adb pull /sdcard/Pictures/TestScreenshots/ test-artifacts/screenshots/ || echo "No screenshots found"

      - name: Pull Allure results from device
        if: always()
        run: |
          mkdir -p allure-results
          adb pull /sdcard/allure-results/ allure-results/ || echo "No Allure results found"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: espresso-test-results
          path: |
            app/build/outputs/androidTest-results/
            app/build/reports/androidTests/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: espresso-screenshots
          path: test-artifacts/screenshots/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-espresso
          path: allure-results/
          retention-days: 30
